<select class="admin__control-select" afterRender="setTimeout(function() {updateInputOption(uid)}, 500);"  data-bind="
    event:{ change: updateInputOption(uid)},
    attr: {
        name: inputName,
        id: uid,
        disabled: disabled,
        'aria-describedby': noticeId
    },
    hasFocus: focused,
    optgroup: options,
    value: value,
    optionsCaption: caption,
    optionsValue: 'value',
    optionsText: 'label'"
></select>
